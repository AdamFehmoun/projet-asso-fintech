<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0C" />
  <title>Fahm.io — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #0A0A0C;
      color: #e5e7eb;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #1a1a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      border: 1px solid #2a2a2e;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f9fafb;
    }

    p {
      font-size: 0.875rem;
      color: #9ca3af;
      max-width: 280px;
      line-height: 1.6;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    .divider {
      width: 40px;
      height: 1px;
      background: #2a2a2e;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="divider"></div>
  <h1>Vous êtes hors ligne</h1>
  <p>Fahm.io nécessite une connexion internet pour accéder à vos données financières.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
